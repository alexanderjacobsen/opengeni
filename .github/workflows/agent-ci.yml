name: Agent CI

# PR gate for the Rust agent workspace (agent/**), purely additive to the bun CI.
# The FULL OS matrix here IS the cross-platform proof: a macOS/Windows compile or
# test break is caught per-PR, not at tag time — and since these legs cannot run on
# the Linux dev box, the green run on hosted macos-26 + windows-latest runners is
# the only evidence the agent builds + tests on those OSes (dossier §23.3 / §24.1).
#
# The Cloudgeni-ai org is on the Team plan, so hosted ubuntu/macos-26/windows-latest
# runners are available; the path-filter keeps docs-only PRs off the (10×-billed)
# macOS leg.

on:
  pull_request:
    paths:
      - "agent/**"
      - ".github/workflows/agent-ci.yml"
  push:
    branches:
      - main
    paths:
      - "agent/**"
      - ".github/workflows/agent-ci.yml"

concurrency:
  group: agent-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: agent

jobs:
  # fmt + clippy run once on ubuntu (they are platform-independent); -D warnings
  # makes a lint a hard failure (dossier §3 idiomatic-Rust requirement).
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install the Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: agent

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy -D warnings
        run: cargo clippy --all-targets --all-features -- -D warnings

  # test + build across the OS matrix. macos-26 (Apple Silicon) + windows-latest
  # each prove the platform compiles AND its unit tests pass — the cross-platform
  # guarantee for the per-OS code (platform/service/update) that cannot run on the
  # Linux dev box. This matches the documented proof set above. (The deprecated
  # Intel macos-13 image is intentionally omitted: it is not in the Team-plan
  # hosted-runner set, never schedules, and macOS is covered by macos-26 here +
  # the macos-26 install-smoke leg below.)
  test:
    name: test + build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # The green matrix here finishes in ~2 min; cap execution so a wedged test
    # (e.g. a PTY master that never delivers EOF) fails fast instead of holding a
    # runner for the 6-hour default and leaving the check perpetually in-progress.
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-26, windows-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install the Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: agent

      - name: cargo test --workspace
        run: cargo test --workspace --all-features

      - name: cargo build --release --workspace
        run: cargo build --release --workspace

  # install-smoke proves the install scripts PARSE + VERIFY + INSTALL on every OS,
  # in CI (non-interactive) mode against a locally-built + minisign-signed mock
  # release — so the curl|sh / irm|iex contract is exercised per-PR on all three OSes
  # (dossier §23.3). It needs no network release and no production key: it generates
  # a throwaway minisign key, signs the freshly-built binary, and runs the REAL
  # script with OPENGENI_INSTALL_BASE_URL pointed at the mock dir.
  install-smoke:
    name: install-smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-26, windows-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install the Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: agent

      - name: Build the agent binary
        run: cargo build --release -p opengeni-agent

      - name: Install minisign (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            brew install minisign
          else
            sudo apt-get update && sudo apt-get install -y minisign
          fi

      - name: Install minisign (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        # choco's minisign is 0.8, which predates the `-W` (no-password keygen) flag
        # the smoke script uses. Download a current release (matches brew/apt on Unix).
        run: |
          $ver = "0.12"
          $url = "https://github.com/jedisct1/minisign/releases/download/$ver/minisign-$ver-win64.zip"
          $zip = Join-Path $env:RUNNER_TEMP "minisign.zip"
          $dest = Join-Path $env:RUNNER_TEMP "minisign"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath $dest -Force
          # The win64 zip ships per-arch subdirs (x86_64/, aarch64/); pick the
          # x86_64 binary for the (x86_64) GitHub Windows runner.
          $exe = Get-ChildItem -Path $dest -Recurse -Filter minisign.exe
          $pick = ($exe | Where-Object { $_.FullName -match 'x86_64|amd64' } | Select-Object -First 1)
          if (-not $pick) { $pick = $exe | Select-Object -First 1 }
          $bin = $pick.DirectoryName
          if (-not $bin) { throw "minisign.exe not found in $dest" }
          Add-Content -Path $env:GITHUB_PATH -Value $bin
          & (Join-Path $bin "minisign.exe") -v

      - name: Smoke the install script (Unix)
        if: runner.os != 'Windows'
        shell: bash
        working-directory: agent
        run: bash install/test/ci-install-smoke.sh

      - name: Simulate the macOS app-bundle assembly (mocked codesign/security)
        if: runner.os != 'Windows'
        shell: bash
        working-directory: agent
        # Runs on Linux + macOS runners alike: sources install.sh as a library and
        # drives the darwin bundle-signing/atomic-swap helpers with mocked tools.
        run: sh install/test/macos-bundle-sim.sh

      - name: Smoke the install script (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: agent
        run: pwsh -File install/test/ci-install-smoke.ps1
