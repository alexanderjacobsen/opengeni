name: Preview Deployment

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy"
        required: false
        default: ""
      name:
        description: "Preview name suffix"
        required: true
        default: "manual"
      teardown:
        description: "Tear down instead of deploy"
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

concurrency:
  group: preview-${{ github.event_name == 'pull_request' && github.event.pull_request.number || inputs.name }}
  cancel-in-progress: false

jobs:
  preview:
    name: Deploy or destroy preview
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    env:
      PREVIEW_REGISTRY: ${{ secrets.OPENGENI_PREVIEW_REGISTRY }}
      PREVIEW_RUNTIME_ENV_B64: ${{ secrets.OPENGENI_PREVIEW_RUNTIME_ENV_B64 }}
      PREVIEW_KUBE_CONFIG_B64: ${{ secrets.OPENGENI_PREVIEW_KUBE_CONFIG_B64 }}
    steps:
      - name: Resolve preview identity
        id: preview
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            suffix="pr-${{ github.event.pull_request.number }}"
            ref="${{ github.event.pull_request.head.sha }}"
            teardown="${{ github.event.action == 'closed' }}"
          else
            suffix="${{ inputs.name }}"
            ref="${{ inputs.ref || github.sha }}"
            teardown="${{ inputs.teardown }}"
          fi
          suffix="$(echo "$suffix" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9-' '-' | sed 's/^-//;s/-$//' | cut -c1-40)"
          echo "suffix=$suffix" >> "$GITHUB_OUTPUT"
          echo "namespace=opengeni-$suffix" >> "$GITHUB_OUTPUT"
          echo "release=opengeni-$suffix" >> "$GITHUB_OUTPUT"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "teardown=$teardown" >> "$GITHUB_OUTPUT"
          echo "tag=${suffix}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"

      - name: Check out repository
        if: steps.preview.outputs.teardown != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.preview.outputs.ref }}

      - name: Set up Bun
        if: steps.preview.outputs.teardown != 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        if: steps.preview.outputs.teardown != 'true'
        run: bun install --frozen-lockfile

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        shell: bash
        run: |
          set -euo pipefail
          test -n "$PREVIEW_KUBE_CONFIG_B64"
          mkdir -p "$HOME/.kube"
          echo "$PREVIEW_KUBE_CONFIG_B64" | base64 -d > "$HOME/.kube/config"
          chmod 0600 "$HOME/.kube/config"

      - name: Tear down preview
        if: steps.preview.outputs.teardown == 'true'
        shell: bash
        run: |
          set -euo pipefail
          helm uninstall "${{ steps.preview.outputs.release }}" --namespace "${{ steps.preview.outputs.namespace }}" --ignore-not-found
          kubectl delete namespace "${{ steps.preview.outputs.namespace }}" --ignore-not-found

      - name: Set up Docker Buildx
        if: steps.preview.outputs.teardown != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to preview registry
        if: steps.preview.outputs.teardown != 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.OPENGENI_PREVIEW_REGISTRY }}
          username: ${{ secrets.OPENGENI_PREVIEW_REGISTRY_USERNAME }}
          password: ${{ secrets.OPENGENI_PREVIEW_REGISTRY_PASSWORD }}

      - name: Build and push images
        if: steps.preview.outputs.teardown != 'true'
        shell: bash
        run: |
          set -euo pipefail
          test -n "$PREVIEW_REGISTRY"
          tag="${{ steps.preview.outputs.tag }}"
          docker build --platform linux/amd64 -f docker/opengeni.Dockerfile --target api -t "$PREVIEW_REGISTRY/opengeni-api:$tag" .
          docker build --platform linux/amd64 -f docker/opengeni.Dockerfile --target worker -t "$PREVIEW_REGISTRY/opengeni-worker:$tag" .
          docker build --platform linux/amd64 -f docker/opengeni.Dockerfile --target web -t "$PREVIEW_REGISTRY/opengeni-web:$tag" .
          docker push "$PREVIEW_REGISTRY/opengeni-api:$tag"
          docker push "$PREVIEW_REGISTRY/opengeni-worker:$tag"
          docker push "$PREVIEW_REGISTRY/opengeni-web:$tag"

      - name: Deploy preview
        if: steps.preview.outputs.teardown != 'true'
        shell: bash
        run: |
          set -euo pipefail
          namespace="${{ steps.preview.outputs.namespace }}"
          release="${{ steps.preview.outputs.release }}"
          tag="${{ steps.preview.outputs.tag }}"
          kubectl create namespace "$namespace" --dry-run=client -o yaml | kubectl apply -f -
          echo "$PREVIEW_RUNTIME_ENV_B64" | base64 -d > /tmp/opengeni-preview.env
          kubectl -n "$namespace" create secret generic opengeni-runtime \
            --from-env-file=/tmp/opengeni-preview.env \
            --dry-run=client -o yaml | kubectl apply -f -
          rm -f /tmp/opengeni-preview.env
          helm upgrade --install "$release" deploy/helm/opengeni \
            --namespace "$namespace" \
            --wait \
            --timeout 10m \
            --set global.imageRegistry="$PREVIEW_REGISTRY" \
            --set secret.existingSecret=opengeni-runtime \
            --set api.image.tag="$tag" \
            --set worker.image.tag="$tag" \
            --set web.image.tag="$tag" \
            --set migrations.image.tag="$tag" \
            --set postgres.enabled=true \
            --set temporal.enabled=true \
            --set nats.enabled=true \
            --set minio.enabled=true \
            --set config.OPENGENI_ENVIRONMENT="$namespace" \
            --set config.OPENGENI_SANDBOX_BACKEND=none

      - name: Run preview conformance
        if: steps.preview.outputs.teardown != 'true'
        shell: bash
        run: |
          set -euo pipefail
          namespace="${{ steps.preview.outputs.namespace }}"
          release="${{ steps.preview.outputs.release }}"
          kubectl -n "$namespace" rollout status "deployment/$release-api" --timeout=180s
          kubectl -n "$namespace" rollout status "deployment/$release-worker" --timeout=180s
          kubectl -n "$namespace" rollout status "deployment/$release-web" --timeout=180s
          kubectl -n "$namespace" port-forward "svc/$release-api" 18080:8000 >/tmp/opengeni-api-port-forward.log 2>&1 &
          api_pf=$!
          kubectl -n "$namespace" port-forward "svc/$release-minio" 19000:9000 >/tmp/opengeni-minio-port-forward.log 2>&1 &
          minio_pf=$!
          trap 'kill "$api_pf" "$minio_pf" 2>/dev/null || true' EXIT
          sleep 5
          bun run deployment:conformance -- \
            --base-url http://127.0.0.1:18080 \
            --object-connect-to "$release-minio:9000:127.0.0.1:19000" \
            --timeout-seconds 180
