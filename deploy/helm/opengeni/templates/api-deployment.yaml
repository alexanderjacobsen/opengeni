{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opengeni.fullname" . }}-api
  labels:
    {{- include "opengeni.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  {{- with .Values.api.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "opengeni.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "opengeni.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if .Values.secret.create }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.api.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "opengeni.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      terminationGracePeriodSeconds: {{ .Values.api.terminationGracePeriodSeconds }}
      {{- if .Values.api.priorityClassName }}
      priorityClassName: {{ .Values.api.priorityClassName | quote }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.api.podSecurityContext | nindent 8 }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: {{ include "opengeni.image" (dict "root" . "image" .Values.api.image) | quote }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.api.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.api.containerPort }}
          envFrom:
            - secretRef:
                name: {{ include "opengeni.secretName" . }}
            - configMapRef:
                name: {{ include "opengeni.fullname" . }}-config
          {{- if or .Values.postgres.enabled .Values.temporal.enabled .Values.minio.enabled }}
          env:
            {{- include "opengeni.generatedRuntimeEnv" . | nindent 12 }}
          {{- else }}
          env: []
          {{- end }}
          {{- if .Values.api.probes.startup.enabled }}
          startupProbe:
            {{- include "opengeni.httpProbe" (dict "probe" .Values.api.probes.startup) | nindent 12 }}
          {{- end }}
          {{- if .Values.api.probes.readiness.enabled }}
          readinessProbe:
            {{- include "opengeni.httpProbe" (dict "probe" .Values.api.probes.readiness) | nindent 12 }}
          {{- end }}
          {{- if .Values.api.probes.liveness.enabled }}
          livenessProbe:
            {{- include "opengeni.httpProbe" (dict "probe" .Values.api.probes.liveness) | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
      {{- if .Values.api.topologySpreadConstraints.enabled }}
      topologySpreadConstraints:
        {{- include "opengeni.topologySpreadConstraints" (dict "root" . "component" "api" "values" .Values.api) | nindent 8 }}
      {{- end }}
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
