{{- if .Values.api.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "opengeni.fullname" . }}-api
  labels:
    {{- include "opengeni.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
  {{- if .Values.observability.metrics.enabled }}
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: {{ .Values.observability.metrics.path | quote }}
    prometheus.io/port: {{ .Values.api.service.port | quote }}
  {{- end }}
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "opengeni.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
{{- end }}
