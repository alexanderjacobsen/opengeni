{{- if and ((.Values.observability).prometheusRule).enabled (.Capabilities.APIVersions.Has "monitoring.coreos.com/v1") }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "opengeni.fullname" . }}
  labels:
    {{- include "opengeni.labels" . | nindent 4 }}
    {{- with ((.Values.observability).prometheusRule).labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with ((.Values.observability).prometheusRule).annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  groups:
    - name: opengeni.rules
      rules:
        {{- if ((.Values.observability).prometheusRule).rules }}
        {{- toYaml ((.Values.observability).prometheusRule).rules | nindent 8 }}
        {{- else }}
        - alert: OpenGeniTurnStuck
          expr: opengeni_turn_oldest_inflight_age_seconds > 900
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: OpenGeni has an agent turn stuck for more than 15 minutes
        - alert: OpenGeniSandboxCreateFailureRatio
          expr: sum(rate(opengeni_sandbox_creates_total{outcome="failed"}[10m])) / clamp_min(sum(rate(opengeni_sandbox_creates_total[10m])), 1) > 0.2
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: OpenGeni sandbox create failures exceed 20%
        - alert: OpenGeniSandboxOrphansTerminatedGrowing
          expr: increase(opengeni_sandbox_orphans_terminated_total[30m]) > 0
          labels:
            severity: warning
          annotations:
            summary: OpenGeni reaper terminated provider-side orphan sandboxes
        - alert: OpenGeniServiceDown
          expr: up{job=~".*opengeni.*"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: An OpenGeni service target is down
        {{- end }}
{{- end }}
