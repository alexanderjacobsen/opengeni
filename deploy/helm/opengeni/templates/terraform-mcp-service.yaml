{{- if .Values.terraformMcp.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "opengeni.fullname" . }}-terraform-mcp
  labels:
    {{- include "opengeni.labels" . | nindent 4 }}
    app.kubernetes.io/component: terraform-mcp
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "opengeni.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: terraform-mcp
{{- end }}
