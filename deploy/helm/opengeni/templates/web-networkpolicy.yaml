{{- if and .Values.networkPolicy.enabled .Values.web.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "opengeni.fullname" . }}-web
  labels:
    {{- include "opengeni.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  podSelector:
    matchLabels:
      {{- include "opengeni.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  policyTypes:
    - Ingress
    {{- if .Values.networkPolicy.egress.enabled }}
    - Egress
    {{- end }}
  ingress:
    - from:
        - namespaceSelector:
            {{- toYaml .Values.networkPolicy.ingressController.namespaceSelector | nindent 12 }}
          podSelector:
            {{- toYaml .Values.networkPolicy.ingressController.podSelector | nindent 12 }}
      ports:
        - protocol: TCP
          port: {{ .Values.web.containerPort }}
  {{- if .Values.networkPolicy.egress.enabled }}
  egress:
    {{- toYaml .Values.networkPolicy.egress.rules | nindent 4 }}
  {{- end }}
{{- end }}
