{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opengeni.fullname" . }}-worker
  labels:
    {{- include "opengeni.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  {{- with .Values.worker.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "opengeni.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "opengeni.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
      {{- with .Values.worker.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "opengeni.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      terminationGracePeriodSeconds: {{ .Values.worker.terminationGracePeriodSeconds }}
      {{- if .Values.worker.priorityClassName }}
      priorityClassName: {{ .Values.worker.priorityClassName | quote }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.worker.podSecurityContext | nindent 8 }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: worker
          image: {{ include "opengeni.image" (dict "root" . "image" .Values.worker.image) | quote }}
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.worker.securityContext | nindent 12 }}
          {{- if .Values.worker.command }}
          command:
            {{- toYaml .Values.worker.command | nindent 12 }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "opengeni.fullname" . }}-config
            - secretRef:
                name: {{ include "opengeni.secretName" . }}
          {{- if or .Values.postgres.enabled .Values.temporal.enabled .Values.minio.enabled }}
          env:
            {{- include "opengeni.generatedRuntimeEnv" . | nindent 12 }}
          {{- end }}
          {{- if .Values.worker.probes.liveness.enabled }}
          livenessProbe:
            {{- if .Values.worker.probes.liveness.exec }}
            exec:
              command:
                {{- toYaml .Values.worker.probes.liveness.exec | nindent 16 }}
            {{- end }}
            initialDelaySeconds: {{ .Values.worker.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.worker.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.worker.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.worker.probes.liveness.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
      {{- if .Values.worker.topologySpreadConstraints.enabled }}
      topologySpreadConstraints:
        {{- include "opengeni.topologySpreadConstraints" (dict "root" . "component" "worker" "values" .Values.worker) | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
