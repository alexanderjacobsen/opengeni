global:
  # Default to the public GHCR images so a vanilla `helm install` pulls the
  # released OpenGeni images with no extra config. Per-cloud example values
  # override this with their own registry. The image tags below are left empty
  # and resolve to the chart appVersion (see the opengeni.image helper).
  imageRegistry: "ghcr.io/cloudgeni-ai"
  imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}
  automountServiceAccountToken: false

networkPolicy:
  enabled: false
  egress:
    enabled: false
    rules: []
  ingressController:
    namespaceSelector: {}
    podSelector: {}
  # Optional: allow a metrics scraper (Prometheus) to reach the relay's
  # GET /metrics on its wss port. Leave unset to omit the rule (the relay has no
  # other ingress source than the ingress controller). When the kube-prometheus
  # ServiceMonitor scrapes from a separate namespace, set both selectors here.
  monitoring: {}
    # namespaceSelector:
    #   matchLabels:
    #     kubernetes.io/metadata.name: monitoring
    # podSelector: {}

config:
  OPENGENI_SERVICE_NAME: opengeni
  OPENGENI_ENVIRONMENT: production
  OPENGENI_DEPLOYMENT_REVISION: dev
  OPENGENI_API_HOST: 0.0.0.0
  OPENGENI_API_PORT: "8000"
  OPENGENI_TEMPORAL_NAMESPACE: default
  OPENGENI_TEMPORAL_TASK_QUEUE: opengeni-runs-ts
  OPENGENI_STARTUP_DEPENDENCY_RETRY_ATTEMPTS: "30"
  OPENGENI_STARTUP_DEPENDENCY_RETRY_INITIAL_DELAY_MS: "1000"
  OPENGENI_STARTUP_DEPENDENCY_RETRY_MAX_DELAY_MS: "5000"
  OPENGENI_AUTH_REQUIRED: "false"
  OPENGENI_AUTH_ALLOW_HEALTH: "true"
  OPENGENI_AUTH_ALLOW_METRICS: "false"
  OPENGENI_WEB_ALLOWED_HOSTS: ""
  OPENGENI_PRODUCT_ACCESS_MODE: local
  OPENGENI_BILLING_MODE: disabled
  OPENGENI_ENTITLEMENTS_MODE: none
  OPENGENI_USAGE_LIMITS_MODE: none
  OPENGENI_STATIC_ENTITLEMENTS_JSON: "{}"
  OPENGENI_STATIC_USAGE_LIMITS_JSON: "{}"
  OPENGENI_OBJECT_STORAGE_BACKEND: s3-compatible
  OPENGENI_OBJECT_STORAGE_BUCKET: opengeni-files
  OPENGENI_OBJECT_STORAGE_REGION: us-east-1
  OPENGENI_OBJECT_STORAGE_S3_PROVIDER: Minio
  OPENGENI_OBJECT_STORAGE_FORCE_PATH_STYLE: "true"
  OPENGENI_SANDBOX_BACKEND: modal
  OPENGENI_SANDBOX_PREPARATION_PROFILES: none

secret:
  create: false
  existingSecret: opengeni-runtime
  # Provide OPENGENI_ACCESS_KEY for deployment shared-key access.
  # Provide OPENGENI_DELEGATION_SECRET for configured/managed product access.
  # Provide Better Auth, Resend, Stripe, GitHub App, model-provider, database,
  # NATS, Temporal, sandbox, and object-storage secrets through this secret or
  # an ExternalSecret. Never commit real secrets in values.
  #
  # Bring-your-own-compute (selfhosted) SECRET keys — set these in the runtime
  # secret (NOT this file) when selfhosted.enabled=true. They thread into the
  # api/worker via `envFrom: secretRef`, into the relay via explicit secretKeyRef,
  # and into the chart-managed NATS via env-var expansion:
  #   OPENGENI_ENROLLMENT_SIGNING_SECRET        HMAC the control plane signs the
  #                                             `oge_` enrollment bearer with and
  #                                             the callout responder verifies it
  #                                             with (falls back to
  #                                             OPENGENI_DELEGATION_SECRET).
  #   OPENGENI_STREAM_TOKEN_SECRET              HMAC the relay verifies the viewer
  #                                             `ogs_` stream token with (already
  #                                             used by sandbox-surfacing).
  #   OPENGENI_SELFHOSTED_RELAY_TOKEN_SECRET    HMAC the relay verifies the agent
  #                                             `ogr_` producer token with (may be
  #                                             omitted to reuse the stream secret).
  #   OPENGENI_SELFHOSTED_NATS_CALLOUT_ACCOUNT_SEED   the callout account SEED the
  #                                             control plane signs user JWTs with.
  #   OPENGENI_SELFHOSTED_NATS_CALLOUT_PUBLIC_KEY     the PUBLIC half of the seed —
  #                                             the nats-server callout `issuer`.
  #   OPENGENI_SELFHOSTED_NATS_CONTROL_PASSWORD       the control-plane NATS login.
  #   OPENGENI_SELFHOSTED_NATS_CALLOUT_PASSWORD       the callout responder login.
  stringData: {}

externalSecret:
  enabled: false
  apiVersion: external-secrets.io/v1
  refreshInterval: 1h
  secretStoreRef:
    name: ""
    kind: ClusterSecretStore
  target:
    creationPolicy: Owner
    deletionPolicy: Retain
  data: []
  dataFrom: []

api:
  enabled: true
  replicaCount: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  image:
    repository: opengeni-api
    # Empty tag resolves to the chart appVersion via the opengeni.image helper.
    tag: ""
    digest: ""
    pullPolicy: IfNotPresent
  containerPort: 8000
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  podAnnotations: {}
  priorityClassName: ""
  terminationGracePeriodSeconds: 30
  topologySpreadConstraints:
    enabled: true
    maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
  nodeSelector: {}
  tolerations: []
  affinity: {}
  probes:
    readiness:
      enabled: true
      path: /healthz
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    liveness:
      enabled: true
      path: /healthz
      initialDelaySeconds: 20
      periodSeconds: 20
      timeoutSeconds: 2
      failureThreshold: 3
    startup:
      enabled: false
      path: /healthz
      periodSeconds: 5
      failureThreshold: 30
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  service:
    type: ClusterIP
    port: 8000
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

worker:
  enabled: true
  replicaCount: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  image:
    repository: opengeni-worker
    # Empty tag resolves to the chart appVersion via the opengeni.image helper.
    tag: ""
    digest: ""
    pullPolicy: IfNotPresent
  command: []
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  podAnnotations: {}
  priorityClassName: ""
  # Worker pods checkpoint in-flight agent turns on SIGTERM (graceful
  # preemption: final conversation-truth reconcile, sandbox envelope,
  # turn requeue). The Temporal worker cancels in-flight activities
  # immediately on shutdown and then waits for them to finish, so this pod
  # grace period is the only bound on the checkpoint window — give it real
  # room. A SIGKILL after this period surfaces as a heartbeat-timeout
  # activity failure, which the session workflow survives by re-dispatching
  # the turn (bounded), but the graceful path loses less.
  terminationGracePeriodSeconds: 120
  topologySpreadConstraints:
    enabled: true
    maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
  nodeSelector: {}
  tolerations: []
  affinity: {}
  probes:
    liveness:
      enabled: false
      exec: []
      initialDelaySeconds: 30
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 3
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 20
    targetCPUUtilizationPercentage: 70

web:
  enabled: true
  replicaCount: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  image:
    repository: opengeni-web
    # Empty tag resolves to the chart appVersion via the opengeni.image helper.
    tag: ""
    digest: ""
    pullPolicy: IfNotPresent
  containerPort: 3000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  podAnnotations: {}
  priorityClassName: ""
  terminationGracePeriodSeconds: 30
  topologySpreadConstraints:
    enabled: true
    maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
  nodeSelector: {}
  tolerations: []
  affinity: {}
  probes:
    readiness:
      enabled: true
      path: /
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    liveness:
      enabled: true
      path: /
      initialDelaySeconds: 20
      periodSeconds: 20
      timeoutSeconds: 2
      failureThreshold: 3
    startup:
      enabled: false
      path: /
      periodSeconds: 5
      failureThreshold: 30
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  service:
    type: ClusterIP
    port: 3000
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# Bring-your-own-compute stream relay (dossier §17 / §25). A stateless wss byte
# pump: the agent (producer) and the viewer (consumer) both dial IN over wss
# through the ingress, and the relay splices their pty/desktop streams. It holds
# NO cluster state and makes NO cluster egress. Disabled by default — the whole
# selfhosted feature is flag-gated off (see config.OPENGENI_SANDBOX_SELFHOSTED_ENABLED)
# so existing deploys are unaffected. Enable together with the ingress relay host,
# nats.authCallout, and the runtime-secret keys below.
relay:
  enabled: false
  replicaCount: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  image:
    repository: opengeni-relay
    # Empty tag resolves to the chart appVersion via the opengeni.image helper.
    tag: ""
    digest: ""
    pullPolicy: IfNotPresent
  # The wss listener port. The container, service targetPort, and the relay's
  # OPENGENI_RELAY_BIND all derive from this single value.
  containerPort: 8443
  # The runtime-secret keys the relay's two HMAC token secrets are read from.
  # The producer (ogr_) secret falls back to the viewer (ogs_) stream-token secret
  # inside the relay when the relay key is absent, so a single OPENGENI_STREAM_TOKEN_SECRET
  # can back both planes.
  streamTokenSecretKey: OPENGENI_STREAM_TOKEN_SECRET
  relayTokenSecretKey: OPENGENI_SELFHOSTED_RELAY_TOKEN_SECRET
  # Non-secret relay tuning knobs (defaults match the relay binary's own defaults).
  tuning:
    ringFrames: 1024
    spliceBuffer: 256
    rateBurstBytes: 16777216
    rateBytesPerSec: 8388608
    pairTimeoutSecs: 120
  extraEnv: []
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi
  podSecurityContext:
    runAsNonRoot: true
    # The distroless:nonroot base runs as uid/gid 65532.
    runAsUser: 65532
    runAsGroup: 65532
    fsGroup: 65532
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  podAnnotations: {}
  priorityClassName: ""
  # In-flight streams drain on SIGTERM (the relay's own handler stops the listener
  # then drains). Give the pod real room so resumable streams keep splicing through
  # a rolling deploy / node drain. The preStop sleep holds the pod past the
  # endpoints-controller propagation so the ingress stops sending NEW dials first.
  terminationGracePeriodSeconds: 120
  preStopDrainSeconds: 15
  topologySpreadConstraints:
    enabled: true
    maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
  # Optional dedicated node pool for the relay edge (values-gated, default off for
  # staging — the relay co-schedules on the platform nodes). Set both to pin the
  # relay to an isolated, internet-facing edge pool.
  nodeSelector: {}
  tolerations: []
  affinity: {}
  probes:
    readiness:
      enabled: true
      path: /healthz
      initialDelaySeconds: 3
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    liveness:
      enabled: true
      path: /healthz
      initialDelaySeconds: 10
      periodSeconds: 20
      timeoutSeconds: 2
      failureThreshold: 3
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  service:
    type: ClusterIP
    port: 8443
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    # The relay is bandwidth/connection bound more than CPU bound; memory is a
    # second cheap signal that needs no metrics adapter. For connection-count or
    # bytes-spliced scaling, wire customMetrics (needs a Prometheus adapter).
    targetMemoryUtilizationPercentage: 80
    customMetrics: []
    behavior: {}

migrations:
  enabled: true
  image:
    repository: opengeni-api
    # Empty tag resolves to the chart appVersion via the opengeni.image helper.
    tag: ""
    digest: ""
    pullPolicy: IfNotPresent
  secret:
    # Optional separate secret for migration/admin-only settings such as
    # OPENGENI_MIGRATIONS_DATABASE_URL. If empty, the runtime secret is reused.
    existingSecret: ""
  command: ["bun", "run", "db:migrate"]
  backoffLimit: 6
  annotations:
    helm.sh/hook: post-install,pre-upgrade
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    helm.sh/hook-weight: "-5"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

