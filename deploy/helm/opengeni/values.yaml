# Disposable dependency fixture for local Kubernetes, CI, previews, and smoke tests.
# Use Azure Blob, AWS S3, GCS, or another production object-store integration for production.
minio:
  enabled: false
  image:
    repository: minio/minio
    tag: RELEASE.2025-09-07T16-13-09Z
    pullPolicy: IfNotPresent
  mcImage:
    repository: minio/mc
    tag: RELEASE.2025-08-13T08-35-41Z
    pullPolicy: IfNotPresent
  auth:
    rootUser: minioadmin
    rootPassword: minioadmin
    existingSecret: ""
    accessKeyKey: MINIO_ROOT_USER
    secretKeyKey: MINIO_ROOT_PASSWORD
  bucket: opengeni-files
  publicEndpoint: ""
  sandboxEndpoint: ""
  corsAllowOrigin: ""
  service:
    apiPort: 9000
    consolePort: 9001
  persistence:
    enabled: true
    size: 20Gi
    storageClassName: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: opengeni.local
      paths:
        - path: /
          pathType: Prefix
          service: web
          # Optional. Defaults to the http service port. Set to api for MinIO/S3-compatible preview bucket paths.
          portName: http
        - path: /v1
          pathType: Prefix
          service: api
        - path: /healthz
          pathType: Exact
          service: api
        - path: /metrics
          pathType: Exact
          service: api
        # The self-hosted agent install surface (get.<domain>). The API serves the
        # committed install scripts AND the per-SHA baked opengeni-agent binaries
        # from /agent/*; these MUST route to api, not fall through to the web SPA.
        # The install bodies + agent binaries carry no secrets and are auth-exempt.
        - path: /install.sh
          pathType: Exact
          service: api
        - path: /install.ps1
          pathType: Exact
          service: api
        - path: /uninstall.sh
          pathType: Exact
          service: api
        - path: /opengeni-agent-minisign.pub
          pathType: Exact
          service: api
        - path: /agent
          pathType: Prefix
          service: api
  tls: []
  # A SECOND, un-gated Ingress for the same host(s) that exposes ONLY the
  # unauthenticated-by-design public paths. Used by edge-gated deployments
  # (e.g. the preview environment, whose primary Ingress sits behind nginx
  # basic-auth) so that a fresh, un-credentialed machine can still
  # `curl -fsSL https://<host>/install.sh | sh` and complete device-flow
  # enrollment, while the web app and the rest of the API stay gated.
  #
  # ingress-nginx merges Ingresses by host and applies auth per location, so the
  # more-specific paths listed here win and are served WITHOUT the primary
  # Ingress's auth annotations. Keep this set MINIMAL — anything added here is
  # publicly reachable. Disabled by default (only edge-gated deployments need it).
  publicIngress:
    enabled: false
    # No auth annotations here by design. cert-manager / proxy tuning may be set
    # by the deployment if this Ingress owns its own TLS entry (otherwise it
    # shares the primary Ingress's already-issued host cert).
    annotations: {}
    hosts:
      - host: opengeni.local
        paths:
          # Installer scripts + the pinned minisign public key (served verbatim,
          # no secrets) — the `curl | sh` entry point and its trust root.
          - path: /install.sh
            pathType: Exact
            service: api
          - path: /install.ps1
            pathType: Exact
            service: api
          - path: /uninstall.sh
            pathType: Exact
            service: api
          - path: /opengeni-agent-minisign.pub
            pathType: Exact
            service: api
          # Release-asset redirects the installer follows (302 → GitHub Releases).
          - path: /agent/latest
            pathType: Prefix
            service: api
          - path: /agent/v
            pathType: Prefix
            service: api
          # Device-flow enrollment BOOTSTRAP endpoints a not-yet-credentialed
          # machine calls (POST). The user-authenticated approve/list/revoke
          # routes live under different paths and stay on the gated Ingress.
          - path: /v1/enrollments/device/start
            pathType: Exact
            service: api
          - path: /v1/enrollments/device/poll
            pathType: Exact
            service: api
    tls: []

# Disposable dependency fixture for local Kubernetes, CI, previews, and smoke tests.
# Use an existing NATS endpoint or the official NATS chart for production.
nats:
  enabled: false
  url: ""
  image:
    repository: nats
    tag: "2-alpine"
    pullPolicy: IfNotPresent
  replicaCount: 1
  clientPort: 4222
  monitorPort: 8222
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  # The bring-your-own-compute tenancy boundary (M-AUTH; dossier §10.1 NATS
  # Accounts + §17). When enabled, the chart-managed nats fixture runs the
  # auth-callout config (deploy/nats/auth-callout.conf is the version-controlled
  # source of truth) with a websocket listener the agents dial over wss through
  # the ingress. The control plane (api/worker) + the callout responder
  # authenticate directly with the control/auth users; every enrolled agent is
  # delegated to the callout responder, which mints a per-workspace-scoped user
  # JWT. The secret VALUES (callout issuer public key, control/auth passwords)
  # come from the runtime secret via env-var expansion — never the configmap.
  #
  # Production typically runs NATS outside this chart (nats.enabled=false) and
  # folds the SAME auth-callout.conf into the platform NATS StatefulSet. This
  # block is the in-chart fixture for preview/smoke + the documented config shape.
  authCallout:
    enabled: false
    # The websocket listener port (TLS terminates at the ingress; no_tls here).
    websocketPort: 8443
    websocketSameOrigin: false
    # The shared application account + the two direct-auth users. Match the
    # control-plane env (OPENGENI_SELFHOSTED_NATS_CALLOUT_ACCOUNT_NAME / _USER /
    # _CONTROL_USER) and the responder's expectations.
    account: APP
    controlUser: control
    calloutUser: auth
    # The runtime-secret keys the callout issuer public key + the two passwords
    # are read from. The issuer is the PUBLIC half of the callout account seed
    # (OPENGENI_SELFHOSTED_NATS_CALLOUT_ACCOUNT_SEED); the chart wires the public
    # key (not the seed) into nats-server. The control plane separately holds the
    # seed (to sign user JWTs) via the runtime secret read by the api/worker.
    calloutPublicKeySecretKey: OPENGENI_SELFHOSTED_NATS_CALLOUT_PUBLIC_KEY
    controlPasswordSecretKey: OPENGENI_SELFHOSTED_NATS_CONTROL_PASSWORD
    calloutPasswordSecretKey: OPENGENI_SELFHOSTED_NATS_CALLOUT_PASSWORD

# Bring-your-own-compute (selfhosted SandboxBackend) NON-SECRET wiring threaded
# into the api/worker configmap. The SECRET values live in the runtime secret
# (see the DEPLOY NOTES / secret keys below). Disabled by default so existing
# deploys are completely unaffected. To enable the feature end-to-end set
# selfhosted.enabled=true, relay.enabled=true, nats.authCallout.enabled=true (or
# point at an external NATS with the callout config), add the ingress relay+nats
# hosts, and provision the runtime-secret keys.
selfhosted:
  enabled: false
  # The public wss URLs the agent dials (must match the ingress hosts below).
  natsUrl: ""   # e.g. wss://nats.opengeni.ai
  relayUrl: ""  # e.g. wss://relay.opengeni.ai
  # The NATS callout account + user NAMES the control plane uses (must match the
  # nats.authCallout block). Non-secret; the seeds/passwords are in the secret.
  natsCalloutAccountName: APP
  natsControlUser: control
  natsCalloutUser: auth

