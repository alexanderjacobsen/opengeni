apiVersion: batch/v1
kind: Job
metadata:
  name: opengeni-temporal-register-default-namespace
  namespace: opengeni-platform
  labels:
    app.kubernetes.io/name: temporal
    app.kubernetes.io/instance: opengeni-temporal
    app.kubernetes.io/component: namespace-registration
    app.kubernetes.io/part-of: opengeni-stack
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: temporal
        app.kubernetes.io/instance: opengeni-temporal
        app.kubernetes.io/component: namespace-registration
        app.kubernetes.io/part-of: opengeni-stack
    spec:
      restartPolicy: Never
      containers:
        - name: temporal-namespace
          image: temporalio/admin-tools:1.31.0
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              temporal operator namespace describe default --address opengeni-temporal-frontend:7233 \
                || temporal operator namespace create default --address opengeni-temporal-frontend:7233 --retention 72h
