apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: opengeni-nats-ingress
  namespace: opengeni-platform
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: nats
      app.kubernetes.io/instance: opengeni-nats
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: opengeni
          podSelector:
            matchExpressions:
              - key: app.kubernetes.io/component
                operator: In
                values:
                  - api
                  - worker
      ports:
        - protocol: TCP
          port: 4222
        - protocol: TCP
          port: 8222
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: opengeni-temporal-frontend-ingress
  namespace: opengeni-platform
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: temporal
      app.kubernetes.io/instance: opengeni-temporal
      app.kubernetes.io/component: frontend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: opengeni
          podSelector:
            matchExpressions:
              - key: app.kubernetes.io/component
                operator: In
                values:
                  - api
                  - worker
      ports:
        - protocol: TCP
          port: 7233
